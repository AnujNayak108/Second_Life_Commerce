AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  EcoBridge v2 - Multi-image AI grading pipeline.
  TypeScript Lambdas + DynamoDB + S3 + Rekognition + API Gateway.

Globals:
  Function:
    Runtime: nodejs20.x
    MemorySize: 512
    Timeout: 30
    Environment:
      Variables:
        TABLE_NAME: !Ref EcoBridgeTable
        GRADING_MEDIA_BUCKET: !Ref GradingMediaBucket
        AWS_NODEJS_CONNECTION_REUSE_ENABLED: "1"

  Api:
    Cors:
      AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
      AllowHeaders: "'Content-Type,Authorization'"
      AllowOrigin: "'*'"

Resources:
  # ─────────────────────────────────────────────────────────────────────────────
  # DynamoDB Table
  # ─────────────────────────────────────────────────────────────────────────────
  EcoBridgeTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: SecondLifeCommerceDB
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: facilityId
          AttributeType: S
        - AttributeName: status
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: SK
              KeyType: HASH
            - AttributeName: PK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: FacilityStatusIndex
          KeySchema:
            - AttributeName: facilityId
              KeyType: HASH
            - AttributeName: status
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # ─────────────────────────────────────────────────────────────────────────────
  # S3 Bucket for grading media (images + video)
  # ─────────────────────────────────────────────────────────────────────────────
  GradingMediaBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "secondlife-grading-media-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        IgnorePublicAcls: false
        BlockPublicPolicy: false
        RestrictPublicBuckets: false
      LifecycleConfiguration:
        Rules:
          - Id: ExpireRawVideoAfter90Days
            Status: Enabled
            ExpirationInDays: 90
            Prefix: "video-raw/"
      CorsConfiguration:
        CorsRules:
          - AllowedMethods: [GET, PUT, POST]
            AllowedOrigins: ["*"]
            AllowedHeaders: ["*"]

  # Public read policy for grading images (prototype — use CloudFront+signed URLs in production)
  GradingMediaBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref GradingMediaBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: PublicReadGetObject
            Effect: Allow
            Principal: "*"
            Action: "s3:GetObject"
            Resource: !Sub "${GradingMediaBucket.Arn}/*"

  # ─────────────────────────────────────────────────────────────────────────────
  # API Gateway
  # ─────────────────────────────────────────────────────────────────────────────
  EcoBridgeApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: EcoBridgeApi
      StageName: prod

  # ─────────────────────────────────────────────────────────────────────────────
  # Lambda: Presigned Upload (TypeScript + esbuild)
  # POST /api/uploads/presign
  # ─────────────────────────────────────────────────────────────────────────────
  PresignFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: EcoBridge-Presign-Upload
      Handler: handler.handler
      CodeUri: ../lambdas/presign/
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - s3:PutObject
              Resource: !Sub "${GradingMediaBucket.Arn}/*"
      Events:
        PresignPost:
          Type: Api
          Properties:
            RestApiId: !Ref EcoBridgeApi
            Path: /api/uploads/presign
            Method: POST
        PresignOptions:
          Type: Api
          Properties:
            RestApiId: !Ref EcoBridgeApi
            Path: /api/uploads/presign
            Method: OPTIONS
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: false
        EntryPoints:
          - handler.ts
        External:
          - "@aws-sdk/client-s3"
          - "@aws-sdk/s3-request-presigner"

  # ─────────────────────────────────────────────────────────────────────────────
  # Lambda: AI Grader v2 (TypeScript + esbuild)
  # POST /api/grade — supports v1 (single image) and v2 (multi-image)
  # ─────────────────────────────────────────────────────────────────────────────
  GraderFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: EcoBridge-AI-Grader
      Handler: handler.handler
      CodeUri: ../lambdas/grader/
      MemorySize: 1024
      Timeout: 30
      Environment:
        Variables:
          DAMAGE_DETECTION_MODE: heuristic
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:GetItem
                - dynamodb:Query
                - dynamodb:UpdateItem
              Resource:
                - !GetAtt EcoBridgeTable.Arn
                - !Sub "${EcoBridgeTable.Arn}/index/*"
            - Effect: Allow
              Action:
                - rekognition:DetectLabels
                - rekognition:DetectModerationLabels
              Resource: "*"
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
              Resource: !Sub "${GradingMediaBucket.Arn}/*"
      Events:
        GradePost:
          Type: Api
          Properties:
            RestApiId: !Ref EcoBridgeApi
            Path: /api/grade
            Method: POST
        GradeOptions:
          Type: Api
          Properties:
            RestApiId: !Ref EcoBridgeApi
            Path: /api/grade
            Method: OPTIONS
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: false
        EntryPoints:
          - handler.ts
        External:
          - "@aws-sdk/client-rekognition"
          - "@aws-sdk/client-dynamodb"
          - "@aws-sdk/lib-dynamodb"
          - "@aws-sdk/client-s3"

  # ─────────────────────────────────────────────────────────────────────────────
  # Lambda: Checkout Intercept (TypeScript + esbuild)
  # POST /api/intercept
  # ─────────────────────────────────────────────────────────────────────────────
  InterceptFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: EcoBridge-Checkout-Intercept
      Handler: handler.handler
      CodeUri: ../lambdas/intercept/
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:Query
                - dynamodb:Scan
                - dynamodb:GetItem
              Resource:
                - !GetAtt EcoBridgeTable.Arn
                - !Sub "${EcoBridgeTable.Arn}/index/*"
      Events:
        InterceptPost:
          Type: Api
          Properties:
            RestApiId: !Ref EcoBridgeApi
            Path: /api/intercept
            Method: POST
        InterceptOptions:
          Type: Api
          Properties:
            RestApiId: !Ref EcoBridgeApi
            Path: /api/intercept
            Method: OPTIONS
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: false
        EntryPoints:
          - handler.ts
        External:
          - "@aws-sdk/client-dynamodb"
          - "@aws-sdk/lib-dynamodb"

  # ─────────────────────────────────────────────────────────────────────────────
  # Lambda: Express API (catch-all)
  # ─────────────────────────────────────────────────────────────────────────────
  ExpressApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: EcoBridge-Express-API
      Handler: lambda.handler
      CodeUri: ../
      Runtime: nodejs20.x
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:*
              Resource:
                - !GetAtt EcoBridgeTable.Arn
                - !Sub "${EcoBridgeTable.Arn}/index/*"
      Events:
        ProxyApiRoot:
          Type: Api
          Properties:
            RestApiId: !Ref EcoBridgeApi
            Path: /
            Method: ANY
        ProxyApiGreedy:
          Type: Api
          Properties:
            RestApiId: !Ref EcoBridgeApi
            Path: /{proxy+}
            Method: ANY

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub https://${EcoBridgeApi}.execute-api.${AWS::Region}.amazonaws.com/prod
  GradingMediaBucketName:
    Description: S3 bucket for grading media
    Value: !Ref GradingMediaBucket
  GraderFunctionArn:
    Value: !GetAtt GraderFunction.Arn
  InterceptFunctionArn:
    Value: !GetAtt InterceptFunction.Arn
  PresignFunctionArn:
    Value: !GetAtt PresignFunction.Arn
  TableName:
    Value: !Ref EcoBridgeTable
