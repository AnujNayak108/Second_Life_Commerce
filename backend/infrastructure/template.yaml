AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Amazon EcoBridge - Serverless backend for hyper-local circular economy.
  DynamoDB + Lambda (Node.js 20.x) + API Gateway.

Globals:
  Function:
    Runtime: nodejs20.x
    MemorySize: 512
    Timeout: 30

Resources:
  # -------------------------------------------------------
  # DynamoDB Table: EcoBridge_Listings
  # Partition key: PK (String)
  # Sort key: SK (String)
  # -------------------------------------------------------
  EcoBridgeListingsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: SecondLifeCommerceDB
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: facilityId
          AttributeType: S
        - AttributeName: status
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: SK
              KeyType: HASH
            - AttributeName: PK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: FacilityStatusIndex
          KeySchema:
            - AttributeName: facilityId
              KeyType: HASH
            - AttributeName: status
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # -------------------------------------------------------
  # API Gateway REST API
  # -------------------------------------------------------
  EcoBridgeApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: EcoBridgeApi
      StageName: prod

  # -------------------------------------------------------
  # Lambda Function: Express API Handler
  # Handles all /api/* routes via serverless-http
  # -------------------------------------------------------
  ExpressApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: SecondLifeCommerceAPI
      Handler: lambda.handler
      CodeUri: ../
      Environment:
        Variables:
          TABLE_NAME: !Ref EcoBridgeListingsTable
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:*
              Resource: 
                - !GetAtt EcoBridgeListingsTable.Arn
                - !Sub "${EcoBridgeListingsTable.Arn}/index/*"
            - Effect: Allow
              Action:
                - rekognition:DetectLabels
              Resource: '*'
      Events:
        ProxyApiRoot:
          Type: Api
          Properties:
            RestApiId: !Ref EcoBridgeApi
            Path: /
            Method: ANY
        ProxyApiGreedy:
          Type: Api
          Properties:
            RestApiId: !Ref EcoBridgeApi
            Path: /{proxy+}
            Method: ANY

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub https://${EcoBridgeApi}.execute-api.${AWS::Region}.amazonaws.com/prod/api
